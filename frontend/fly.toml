app = "olympo-frontend"
primary_region = "gru"

[build]
dockerfile = "Dockerfile"

[[services]]
internal_port = 80
protocol = "tcp"

[[services.ports]]
handlers = ["http"]
port = 80

[[services.ports]]
handlers = ["tls", "http"]
port = 443

[services.concurrency]
hard_limit = 50
soft_limit = 40

[[services.http_checks]]
interval = "30s"
timeout = "10s"
grace_period = "30s"
method = "GET"
path = "/"

[vm]
memory = "256mb"
cpu_kind = "shared"
cpus = 1
