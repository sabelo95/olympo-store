  expiration: ${JWT_EXPIRATION:86400000}

# ===============================
# 🗄️ PostgreSQL Database
# ===============================
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://db-arka.ctg8eksoszyw.us-east-2.rds.amazonaws.com:5432/postgres}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:admin123}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # ===============================
  # ✉️ Mail Configuration
  # ===============================
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:santiagoberriolopez@gmail.com}
    password: ${SPRING_MAIL_PASSWORD:lmat yeeh xkhj hvzp}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}

  # ===============================
  # 🍃 MongoDB Configuration
  # ===============================
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017}
      database: ${MONGO_DB:notificacionesdb}

  # ===============================
  # 📁 Multipart Configuration
  # ===============================
  servlet:
    multipart:
      enabled: true
      max-file-size: ${MAX_FILE_SIZE:20MB}
      max-request-size: ${MAX_REQUEST_SIZE:20MB}

# ===============================
# 🌐 Server Configuration
# ===============================
server:
  port: ${SERVER_PORT:8085}

# ===============================
# 📚 Swagger/OpenAPI Configuration
# ===============================
springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
    path: /api-docs
  swagger-ui:
    enabled: ${SWAGGER_UI_ENABLED:true}
    path: /swagger-ui.html