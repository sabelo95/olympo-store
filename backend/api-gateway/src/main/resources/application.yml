spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # ============= RUTAS PARA API-DOCS (SWAGGER) =============
        - id: auth-api-docs
          uri: ${AUTH_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/auth-api-docs
          filters:
            - SetPath=/v3/api-docs

        - id: productos-api-docs
          uri: ${PRODUCTO_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/productos-api-docs
          filters:
            - SetPath=/v3/api-docs

        - id: ordenes-api-docs
          uri: ${COMPRAS_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/ordenes-api-docs
          filters:
            - SetPath=/v3/api-docs

        - id: notificaciones-api-docs
          uri: ${NOTIFICACIONES_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/notificaciones-api-docs
          filters:
            - SetPath=/v3/api-docs


        # ============= AUTH SERVICE =============
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/auth/**


        # ============= PRODUCTOS SERVICE =============
        - id: productos-service
          uri: ${PRODUCTO_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/productos/**


        # ============= CATEGORIAS SERVICE =============
        - id: categorias-service
          uri: ${PRODUCTO_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/categorias/**


        # ============= MARCAS SERVICE =============
        - id: marcas-service
          uri: ${PRODUCTO_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/marcas/**


        # ============= REPORTE SERVICE =============
        - id: reporte-service
          uri: ${PRODUCTO_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/reporte/**


        # ============= ORDENES/COMPRAS SERVICE =============
        - id: ordenes-service
          uri: ${COMPRAS_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/carritos/**,/api/clientes/**,/api/pedidos/**,/api/reportes/**,/api/health/**


        # ============= NOTIFICACIONES SERVICE =============
        - id: notificaciones-service
          uri: ${NOTIFICACIONES_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/notificaciones/**


      # Configuración global CORS
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "${ALLOWED_ORIGINS:*}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false

      # Configuración para forward de headers
      default-filters:
        - RemoveResponseHeader=Access-Control-Allow-Origin
        - RemoveResponseHeader=Access-Control-Allow-Credentials
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin, RETAIN_UNIQUE


# ============= CONFIGURACIÓN DE SWAGGER UI EN EL GATEWAY =============
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    disable-swagger-default-url: true
    urls:
      - name: Auth Service
        url: /auth-api-docs
      - name: Productos Service (incluye Categorías, Marcas y Reportes)
        url: /productos-api-docs
      - name: Ordenes Service
        url: /ordenes-api-docs
      - name: Notificaciones Service
        url: /notificaciones-api-docs


# ============= CONFIGURACIÓN DEL SERVIDOR =============
server:
  port: ${SERVER_PORT:8081}
  forward-headers-strategy: framework


