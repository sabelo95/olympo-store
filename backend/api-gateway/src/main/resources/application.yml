spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # ============= RUTAS PARA API-DOCS (SWAGGER) =============
        - id: auth-api-docs
          uri: ${AUTH_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/auth-api-docs
          filters:
            - SetPath=/v3/api-docs

        - id: productos-api-docs
          uri: ${PRODUCTO_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/productos-api-docs
          filters:
            - SetPath=/v3/api-docs

        - id: ordenes-api-docs
          uri: ${COMPRAS_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/ordenes-api-docs
          filters:
            - SetPath=/v3/api-docs

        - id: notificaciones-api-docs
          uri: ${NOTIFICACIONES_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/notificaciones-api-docs
          filters:
            - SetPath=/v3/api-docs


        # ============= AUTH SERVICE =============
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/auth/**


        # ============= PRODUCTOS SERVICE =============
        - id: productos-service
          uri: ${PRODUCTO_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/productos/**


        # ============= CATEGORIAS SERVICE =============
        - id: categorias-service
          uri: ${PRODUCTO_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/categorias/**


        # ============= MARCAS SERVICE =============
        - id: marcas-service
          uri: ${PRODUCTO_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/marcas/**


        # ============= REPORTE SERVICE =============
        - id: reporte-service
          uri: ${PRODUCTO_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/reporte/**


        # ============= TAMANOS SERVICE =============
        - id: tamanos-service
          uri: ${PRODUCTO_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/tamanos/**


        # ============= SABORES SERVICE =============
        - id: sabores-service
          uri: ${PRODUCTO_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/sabores/**


        # ============= VARIANTES SERVICE =============
        - id: variantes-service
          uri: ${PRODUCTO_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/variantes-producto/**


        # ============= UPLOADS (archivos estáticos) =============
        - id: uploads-service
          uri: ${PRODUCTO_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/uploads/**


        # ============= ORDENES/COMPRAS SERVICE =============
        - id: ordenes-service
          uri: ${COMPRAS_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/carritos/**,/api/clientes/**,/api/pedidos/**,/api/reportes/**,/api/health/**,/api/dashboard/**,/api/cupones/**,/api/wompi/**


        # ============= NOTIFICACIONES SERVICE =============
        - id: notificaciones-service
          uri: ${NOTIFICACIONES_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/notificaciones/**


      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns:
              - "https://olympo-frontend.fly.dev"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowed-headers:
              - Content-Type
              - Authorization
              - X-Requested-With
            allow-credentials: true
            max-age: 3600

      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin, RETAIN_UNIQUE
        - AddResponseHeader=X-Content-Type-Options, nosniff
        - AddResponseHeader=X-Frame-Options, DENY
        - AddResponseHeader=Referrer-Policy, strict-origin-when-cross-origin
        - AddResponseHeader=Permissions-Policy, camera=(), microphone=(), geolocation=()
        - "AddResponseHeader=Content-Security-Policy, default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://olympo-gateway.fly.dev https://checkout.wompi.co; frame-src https://checkout.wompi.co; font-src 'self' data:"


# ============= CONFIGURACIÓN DE SWAGGER UI EN EL GATEWAY =============
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false


# ============= CONFIGURACIÓN DEL SERVIDOR =============
server:
  port: ${SERVER_PORT:8081}
  forward-headers-strategy: framework


