spring.application.name=compras-service
producto.service.url=${PRODUCTO_SERVICE_URL:http://localhost:8083}
notificacion.service.url=${NOTIFICACION_SERVICE_URL:http://localhost:8085/notificaciones}
server.port=${SERVER_PORT:8084}
logging.level.org.springframework.security=DEBUG

# ===============================
# Base de datos PostgreSQL
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/db_ARKA}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# ===============================
# Zona horaria
# ===============================
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# JWT
# ===============================
