spring.application.name=compras-service
notificacion.service.url=${NOTIFICACION_SERVICE_URL:http://localhost:8085/notificaciones}
server.port=${SERVER_PORT:8084}
logging.level.org.springframework.security=DEBUG

# ===============================
# Base de datos PostgreSQL
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/db_ARKA}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# Zona horaria
# ===============================
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# JWT
# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET:c2VjcmV0S2V5Rm9yT2x5bXBvU3RvcmVBcHBsaWNhdGlvbldpdGhKV1RBdXRoZW50aWNhdGlvbg==}

# ===============================
# Swagger/OpenAPI
# ===============================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
