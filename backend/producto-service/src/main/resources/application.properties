server.port=${SERVER_PORT:8083}
logging.level.org.springframework.security=DEBUG

# ===============================
# Base de datos PostgreSQL
# ===============================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/db_ARKA}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# JWT
# ===============================
jwt.secret=${JWT_SECRET:c2VjcmV0S2V5Rm9yT2x5bXBvU3RvcmVBcHBsaWNhdGlvbldpdGhKV1RBdXRoZW50aWNhdGlvbg==}

# ===============================
# Swagger/OpenAPI
# ===============================
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Configuraciˇn para subir archivos
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Directorio para imßgenes
file.upload-dir=src/main/resources/static/uploads/productos